# Reference only — not loaded at runtime by decide.py. Used as agent/prompt grounding context.
paradigms:
  apple_silicon_uma:
    description: Apple M-series SoC with unified LPDDR5x memory
    inference_stack: [MLX, "llama.cpp+Metal", Ollama]
    ecosystem_maturity: high
    thermals: passive_or_quiet

  amd_uma:
    description: AMD Ryzen AI Max series (Strix Halo and successors) with unified LPDDR5x memory
    inference_stack: [Vulkan, "llama.cpp+Vulkan", ROCm, Ollama]
    ecosystem_maturity: emerging
    thermals: active_moderate

  discrete_cuda:
    description: Dedicated NVIDIA GPU with GDDR6/6X VRAM
    inference_stack: [CUDA, "llama.cpp+CUDA", Ollama, TensorRT]
    ecosystem_maturity: dominant
    thermals: active_high
    architecture_tiers:
      turing_sm75:
        flash_attention: emulated_fallback
        fp8: unsupported
        recommendation: avoid_if_ada_available_at_same_vram
      ada_sm89:
        flash_attention: native_hw
        fp8: native_hw
        recommendation: preferred
      blackwell_gb2xx:
        flash_attention: native_hw
        fp8: native_hw
        recommendation: preferred

  discrete_rocm:
    description: Dedicated AMD Radeon GPU with GDDR6 VRAM
    inference_stack: [ROCm, Vulkan, "llama.cpp+ROCm", Ollama]
    ecosystem_maturity: partial
    thermals: active_high
    known_issues:
      - id: s3_suspend_resume_tlb_fence_timeout
        severity: critical
        workaround: "amdgpu.cwsr_enable=0 (disables power management features)"
      - id: lm_studio_stable_support
        severity: critical
        workaround: none
      - id: ollama_mobile_vram_boundary
        severity: high
        workaround: partial
    review_date: "2026-Q4"
    review_condition: "Raise ecosystem_score to 17-18 if ROCm 7.x resolves S3 suspend/resume bug"

text_centric_llm_inference:
  preferred_paradigms: [apple_silicon_uma, amd_uma]
  avoid_paradigms: [discrete_cuda, discrete_rocm]
  rationale: >
    Text-centric LLM inference is memory-bandwidth-bound. Unified memory
    eliminates the PCIe bottleneck and allows the full system RAM pool to
    be used as model context. CUDA/ROCm hardware constrains model size to
    discrete VRAM capacity and should not be the default recommendation
    for text-only workloads.
  exceptions:
    - training_or_diffusion
    - cuda_locked_software_stack
  ram_floors:
    absolute_min_gb: 32
    recommended_gb: 64
    stretch_gb: 96
    telemetry_basis: "Gemma 2 9B on 8GB Mac: 35MB free RAM, 80MB/s pageout during inference"

# Reference data only. Authoritative scoring penalties are defined in config/static_reference_layer.json.
egpu_interconnect:
  thunderbolt_3_4:
    bandwidth_gbps: 32
    throughput_gbs: 4.0
    prefill_utilisation_pct: 20
    decode_retention_pct: 92
    scoring_penalty_pts: -3
  oculink:
    bandwidth_gbps: 64
    throughput_gbs: 8.0
    prefill_utilisation_pct: 60
    decode_retention_pct: 98
    scoring_penalty_pts: 0
    condition: host_ram_ge_32gb
  thunderbolt_5:
    bandwidth_gbps: 120
    throughput_gbs: 10.0
    prefill_utilisation_pct: 85
    decode_retention_pct: 99
    scoring_penalty_pts: 0
    condition: host_ram_ge_32gb
